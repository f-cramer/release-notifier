version: 2

updates:
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 9999
    groups:
      spring:
        patterns:
          - "org.springframework.boot*"
          - "org.springframework*"
      kotlin:
        patterns:
          - "org.jetbrains.kotlin*"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
